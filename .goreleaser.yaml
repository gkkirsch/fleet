version: 2

# Archive name uses ProjectName so the URL matches the repo
# (gkkirsch/director → director_darwin_arm64.tar.gz). The binary
# inside is `director-server` — distinct from the binary so it's
# clear what the file is when bundled into Director.app.
project_name: director

before:
  hooks:
    - go mod tidy

builds:
  - id: director-server
    main: .
    binary: director-server
    env:
      - CGO_ENABLED=0
    goos: [darwin]
    goarch: [arm64, amd64]
    flags: [-trimpath]
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}

archives:
  - id: director-server
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

release:
  prerelease: auto
  draft: false
  name_template: "{{ .ProjectName }} {{ .Tag }}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - Merge pull request
